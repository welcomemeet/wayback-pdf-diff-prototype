<!DOCTYPE html>
<html>
<head>

<style>

body{
font-family:Arial;
margin:40px;
}

.added{
background:#d4ffd4;
padding:8px;
margin:5px;
}

.removed{
background:#ffd4d4;
padding:8px;
margin:5px;
}

</style>

</head>

<body>

<h2>Wayback PDF Diff Prototype</h2>

<div id="results"></div>

<script>

fetch("../backend/diff.json")
.then(res => res.json())
.then(data => {

    const container = document.getElementById("results")

    data.forEach(item => {

        const div = document.createElement("div")

        div.className = item.type

        div.innerHTML =
        "<b>Page " + item.page + "</b><br>" +
        item.type.toUpperCase() + ": " + item.text

        container.appendChild(div)

    })

})

</script>

</body>
</html>
